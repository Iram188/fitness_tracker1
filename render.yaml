services:
  - type: web
    name: fittrack-api
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false        # Set this in Render dashboard → Environment
      - key: JWT_SECRET
        sync: false        # Set this in Render dashboard → Environment
      - key: FRONTEND_URL
        sync: false        # Set to your Vercel URL after deploying frontend
