<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — FitTrack</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="auth-page">
    <!-- HERO SIDE -->
    <div class="auth-hero">
      <a href="../index.html" class="nav-logo" style="font-size:1.6rem;margin-bottom:48px;">FIT<span>TRACK</span></a>
      <div class="auth-hero-label">Welcome Back</div>
      <h1 class="auth-hero-title">Time to<br>Get Back<br>to Work</h1>
      <p class="auth-hero-sub">Your progress is waiting. Log in and keep the momentum going. Every session counts.</p>
      <div class="auth-hero-stats">
        <div>
          <div class="auth-hero-stat-num">💪</div>
          <div class="auth-hero-stat-label">Workouts Logged</div>
        </div>
        <div>
          <div class="auth-hero-stat-num">🔥</div>
          <div class="auth-hero-stat-label">Calories Burnt</div>
        </div>
      </div>
    </div>

    <!-- FORM SIDE -->
    <div class="auth-form-side">
      <div class="auth-form-container fade-in">
        <div class="auth-form-title">Welcome Back</div>
        <div class="auth-form-sub">Enter your credentials to continue</div>

        <div id="alert" class="alert alert-error" role="alert">
          <span>⚠️</span><span id="alert-msg"></span>
        </div>

        <form class="auth-form" id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" placeholder="john@example.com" required autofocus />
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" placeholder="Your password" required />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
            Log In →
          </button>
        </form>
        <div class="auth-link">
          Don't have an account? <a href="signup.html">Sign Up Free</a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="../js/config.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

    const form = document.getElementById('login-form');
    const alert = document.getElementById('alert');
    const alertMsg = document.getElementById('alert-msg');
    const submitBtn = document.getElementById('submit-btn');

    function showError(msg) {
      alertMsg.textContent = msg;
      alert.classList.add('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alert.classList.remove('show');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return showError('Email and password are required.');

      submitBtn.textContent = 'Logging in...';
      submitBtn.disabled = true;

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        Auth.setSession(data.token, data.user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message);
        submitBtn.textContent = 'Log In →';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
